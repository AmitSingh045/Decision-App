{% extends 'base.html' %}
{% block title %}Login — Decision App{% endblock %}

{% block content %}
<div class="center-flex">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Login to continue making smart decisions.</p>
        </div>

        <form method="post" id="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label" for="login-username">Username</label>
                <input class="form-control" type="text" id="login-username" name="username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <input class="form-control" type="password" id="login-password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-full">⚡ Login</button>
        </form>

        <p class="text-center mt-4" style="color:var(--text-muted); font-size:0.9rem;">
            Don't have an account?
            <a href="{% url 'register' %}" style="color:var(--primary); text-decoration:none; font-weight:600;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
