{% extends 'base.html' %}
{% block title %}Register — Decision App{% endblock %}

{% block content %}
<div class="center-flex">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join Decision App and stop overthinking.</p>
        </div>

        <form method="post" id="register-form">
            {% csrf_token %}
            <input type="hidden" name="action" value="register">

            <div class="form-group">
                <label class="form-label" for="reg-username">Username</label>
                <input class="form-control" type="text" id="reg-username" name="username" placeholder="Choose a username" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-password">Password</label>
                <input class="form-control" type="password" id="reg-password" name="password" placeholder="Create a password" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="reg-password2">Confirm Password</label>
                <input class="form-control" type="password" id="reg-password2" name="password2" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-full">🚀 Create Account</button>
        </form>

        <p class="text-center mt-4" style="color:var(--text-muted); font-size:0.9rem;">
            Already have an account?
            <a href="{% url 'login' %}" style="color:var(--primary); text-decoration:none; font-weight:600;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
